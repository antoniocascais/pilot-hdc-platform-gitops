apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: guacamole
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/PilotDataPlatform/pilot-hdc-platform-gitops.git
        revision: main
        files:
          - path: "clusters/dev/workbench/projects/*.yaml"
  syncPolicy:
    applicationsSync: create-update
  template:
    metadata:
      name: 'guacamole-{{ .name }}'
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "13"
      # NO finalizer — stateful app with PVC
    spec:
      project: default
      source:
        repoURL: https://github.com/PilotDataPlatform/pilot-hdc-platform-gitops.git
        targetRevision: main
        path: clusters/dev/workbench/guacamole-stack
        helm:
          valueFiles:
            - ../../registry.yaml
            - values.yaml
          parameters:
            - name: projectName
              value: '{{ .name }}'
            - name: domain
              value: 'dev.hdc.ebrains.eu'
      destination:
        server: https://kubernetes.default.svc
        namespace: 'project-{{ .name }}'
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
