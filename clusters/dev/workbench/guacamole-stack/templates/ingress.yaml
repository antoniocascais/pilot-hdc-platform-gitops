apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: guacamole
  labels:
    app.kubernetes.io/name: guacamole
    {{- include "guacamole-stack.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ .Values.domain }}
      secretName: {{ .Values.domain }}-tls
  rules:
    - host: {{ .Values.domain }}
      http:
        paths:
          - path: /workbench/{{ .Values.projectName }}/(guacamole(/|$).*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: guacamole
                port:
                  number: 8080
