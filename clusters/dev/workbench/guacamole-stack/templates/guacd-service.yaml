apiVersion: v1
kind: Service
metadata:
  name: guacd
  labels:
    app.kubernetes.io/name: guacd
    {{- include "guacamole-stack.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 4822
      targetPort: guacd
      protocol: TCP
      name: guacd
  selector:
    app.kubernetes.io/name: guacd
    app.kubernetes.io/instance: {{ .Release.Name }}
