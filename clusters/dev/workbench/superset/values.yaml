projectName: ""
domain: "dev.hdc.ebrains.eu"

superset:
  fullnameOverride: superset

  # Upstream Apache releases, pinned here — not in versions.yaml (matches CSCS 0.8.8)
  image:
    repository: n47w5524.c1.de1.container-registry.ovh.net/hdc-services-external/apache/superset
    tag: "2.0.1"
    pullPolicy: IfNotPresent

  initImage:
    repository: n47w5524.c1.de1.container-registry.ovh.net/hdc-services-external/jwilder/dockerize
    tag: "working-version-2017"
    pullPolicy: IfNotPresent

  imagePullSecrets:
    - name: docker-registry-secret

  runAsUser: 0

  bootstrapScript: |
    #!/bin/bash
    rm -rf /var/lib/apt/lists/* && \
    pip install \
      psycopg2-binary==2.9.1 \
      authlib==0.15.5 \
      redis==3.5.3 && \
    if [ ! -f ~/bootstrap ]; then echo "Running Superset with uid {{ .Values.runAsUser }}" > ~/bootstrap; fi

  envFromSecrets: ["superset-keycloak"]

  configOverrides:
    enable_oauth: |
      import os
      ENABLE_PROXY_FIX = True

      from flask_appbuilder.security.manager import AUTH_OAUTH
      AUTH_TYPE = AUTH_OAUTH
      OAUTH_PROVIDERS = [
          {
              "name": "keycloak",
              "icon": "fa-key",
              "token_key": "access_token",
              "remote_app": {
                  "client_id": os.environ.get("KEYCLOAK_CLIENT_ID"),
                  "client_secret": os.environ.get("KEYCLOAK_SECRET"),
                  "api_base_url": "https://iam.dev.hdc.ebrains.eu/realms/hdc/protocol/",
                  "client_kwargs": {"scope": "email openid profile"},
                  "request_token_url": None,
                  "access_token_url": "https://iam.dev.hdc.ebrains.eu/realms/hdc/protocol/openid-connect/token",
                  "authorize_url": "https://iam.dev.hdc.ebrains.eu/realms/hdc/protocol/openid-connect/auth",
              },
          }
      ]

      AUTH_ROLE_ADMIN = 'Admin'
      AUTH_ROLE_PUBLIC = 'Public'
      AUTH_USER_REGISTRATION = True
      AUTH_USER_REGISTRATION_ROLE = "Gamma"

    session_lifetime: |
      from flask import session
      from flask import Flask
      from datetime import timedelta

      def make_session_permanent():
          session.permanent = True

      PERMANENT_SESSION_LIFETIME = timedelta(minutes=5)
      def FLASK_APP_MUTATOR(app: Flask) -> None:
          app.before_request_funcs.setdefault(None, []).append(make_session_permanent)

    secret_key: |
      import os
      SECRET_KEY = os.environ.get("SUPERSET_SECRET_KEY", "CHANGE_ME_TO_A_COMPLEX_RANDOM_SECRET")

  # Upstream ingress disabled — host values aren't tpl-processed
  ingress:
    enabled: false

  init:
    adminUser:
      username: superset-admin
      firstname: Superset
      lastname: Admin
      email: admin@superset.com
      password: admin
    initContainers:
      - name: wait-for-postgres
        image: "{{ .Values.initImage.repository }}:{{ .Values.initImage.tag }}"
        imagePullPolicy: "{{ .Values.initImage.pullPolicy }}"
        envFrom:
          - secretRef:
              name: "{{ tpl .Values.envFromSecret . }}"
        command:
          - /usr/local/bin/dockerize
        args:
          - -wait
          - "tcp://$(DB_HOST):$(DB_PORT)"
          - -timeout
          - 120s

  supersetNode:
    initContainers:
      - name: wait-for-postgres
        image: "{{ .Values.initImage.repository }}:{{ .Values.initImage.tag }}"
        imagePullPolicy: "{{ .Values.initImage.pullPolicy }}"
        envFrom:
          - secretRef:
              name: "{{ tpl .Values.envFromSecret . }}"
        command:
          - /usr/local/bin/dockerize
        args:
          - -wait
          - tcp://$(DB_HOST):$(DB_PORT)
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        cpu: "1"
        memory: 1Gi

  supersetWorker:
    initContainers:
      - name: wait-for-postgres-redis
        image: "{{ .Values.initImage.repository }}:{{ .Values.initImage.tag }}"
        imagePullPolicy: "{{ .Values.initImage.pullPolicy }}"
        envFrom:
          - secretRef:
              name: "{{ tpl .Values.envFromSecret . }}"
        command:
          - /usr/local/bin/dockerize
          - -wait
          - tcp://$(DB_HOST):$(DB_PORT)
          - -wait
          - tcp://$(REDIS_HOST):$(REDIS_PORT)
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 1Gi

  supersetCeleryBeat:
    enabled: false

  supersetCeleryFlower:
    enabled: false

  supersetWebsockets:
    enabled: false

  postgresql:
    enabled: true
    global:
      imageRegistry: n47w5524.c1.de1.container-registry.ovh.net
      imagePullSecrets:
        - docker-registry-secret
    image:
      repository: hdc-services-external/bitnami/postgresql
    primary:
      persistence:
        size: 2Gi
        storageClass: "csi-cinder-high-speed"
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi

  redis:
    enabled: true
    global:
      imageRegistry: n47w5524.c1.de1.container-registry.ovh.net
      imagePullSecrets:
        - docker-registry-secret
    image:
      repository: hdc-services-external/bitnami/redis
    architecture: standalone
    auth:
      enabled: false
    master:
      persistence:
        enabled: false
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 250m
          memory: 128Mi
