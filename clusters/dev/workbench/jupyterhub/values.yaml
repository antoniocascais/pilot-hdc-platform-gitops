projectName: ""
domain: "dev.hdc.ebrains.eu"

jupyterhub:
  fullnameOverride: ""

  imagePullSecrets:
    - name: docker-registry-secret

  hub:
    image:
      name: n47w5524.c1.de1.container-registry.ovh.net/hdc-services-external/jupyterhub/k8s-hub
      tag: "3.3.8"
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 200m
        memory: 250Mi
    db:
      type: sqlite-pvc
      pvc:
        storageClassName: csi-cinder-high-speed
        storage: 1Gi

    config:
      JupyterHub:
        authenticator_class: oauthenticator.generic.GenericOAuthenticator
      GenericOAuthenticator:
        login_service: keycloak
        authorize_url: https://iam.dev.hdc.ebrains.eu/realms/hdc/protocol/openid-connect/auth
        token_url: http://keycloak.keycloak/realms/hdc/protocol/openid-connect/token
        userdata_url: https://iam.dev.hdc.ebrains.eu/realms/hdc/protocol/openid-connect/userinfo
        enable_auth_state: true
        userdata_token_method: GET
        userdata_params:
          state: state
        username_claim: preferred_username
        allow_all: true
      OAuthenticator:
        scope:
          - "openid"
          - "profile"
          - "email"
          - "roles"
          - "web-origins"
          - "groups"

    extraEnv:
      KEYCLOAK_CLIENT_ID:
        valueFrom:
          secretKeyRef:
            name: jupyterhub-keycloak
            key: KEYCLOAK_CLIENT_ID
      KEYCLOAK_CLIENT_SECRET:
        valueFrom:
          secretKeyRef:
            name: jupyterhub-keycloak
            key: KEYCLOAK_CLIENT_SECRET

    extraConfig:
      oauth_dynamic: |
        import os
        c.GenericOAuthenticator.client_id = os.environ.get("KEYCLOAK_CLIENT_ID", "")
        c.GenericOAuthenticator.client_secret = os.environ.get("KEYCLOAK_CLIENT_SECRET", "")
        base_url = c.JupyterHub.base_url
        c.GenericOAuthenticator.oauth_callback_url = f"https://dev.hdc.ebrains.eu{base_url}hub/oauth_callback"
      spawner_config: |
        c.Spawner.cmd = ['start.sh', 'jupyterhub-singleuser', '--allow-root']
        c.KubeSpawner.args = ['--allow-root']
        def notebook_dir_hook(spawner):
            spawner.environment.update({
                'NB_USER': spawner.user.name,
                'NB_UID': '1000',
                'IPYTHONDIR': '/tmp',
                'PATH': '/opt/conda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/opt/shared',
                'base_url': 'https://dev.hdc.ebrains.eu/',
                'url_bff': 'https://dev.hdc.ebrains.eu/cli',
                'url_keycloak': 'https://iam.dev.hdc.ebrains.eu/realms/hdc/protocol/openid-connect',
                'keycloak_device_client_id': 'cli'
            })
        c.Spawner.pre_spawn_hook = notebook_dir_hook

  proxy:
    service:
      type: ClusterIP    # behind ingress-nginx, no LoadBalancer needed
    chp:
      image:
        name: n47w5524.c1.de1.container-registry.ovh.net/hdc-services-external/jupyterhub/configurable-http-proxy
        tag: "4.6.1"
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 200m
          memory: 128Mi
    # secretToken auto-generated by chart (lookup + random). No hardcoded value in public repo.
    traefik:
      image:
        name: n47w5524.c1.de1.container-registry.ovh.net/hdc-services-external/traefik
        tag: "v2.11.0"
    secretSync:
      image:
        name: n47w5524.c1.de1.container-registry.ovh.net/hdc-services-external/jupyterhub/k8s-secret-sync
        tag: "3.3.8"

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/proxy-body-size: 20m
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
      nginx.ingress.kubernetes.io/affinity: cookie
    hosts:
      - dev.hdc.ebrains.eu
    pathType: Prefix
    tls:
      - secretName: dev.hdc.ebrains.eu-tls
        hosts:
          - dev.hdc.ebrains.eu

  singleuser:
    image:
      name: n47w5524.c1.de1.container-registry.ovh.net/hdc-services-external/jupyter/minimal-notebook
      tag: "2023-10-20"
    networkTools:
      image:
        name: n47w5524.c1.de1.container-registry.ovh.net/hdc-services-external/jupyterhub/k8s-network-tools
        tag: "3.3.8"
    uid: 0
    extraEnv:
      CHOWN_HOME: 'yes'
    extraFiles:
      .condarc:
        mountPath: /home/{username}/.condarc
        stringData: |
          envs_dirs:
             - $HOME/.conda_envs/
    storage:
      capacity: 1Gi
      homeMountPath: /home/{username}
      dynamic:
        storageClass: csi-cinder-high-speed
      extraVolumes:
        - name: jupyter-shared
          persistentVolumeClaim:
            claimName: shared-tools
      extraVolumeMounts:
        - name: jupyter-shared
          mountPath: /opt/shared
          readOnly: true
    profileList:
      - display_name: "Minimal environment"
        description: "To avoid too much bells and whistles: Python."
        default: true
      - display_name: "Datascience environment"
        description: "If you want the additional bells and whistles: Python, R, and Julia."
        kubespawner_override:
          image: n47w5524.c1.de1.container-registry.ovh.net/hdc-services-external/jupyter/datascience-notebook:2023-10-20
    cpu:
      limit: 1
      guarantee: 0.5
    memory:
      limit: 4G
      guarantee: 1G
    cloudMetadata:
      blockWithIptables: false    # requires privileged initContainer; skip for dev
    networkPolicy:
      enabled: true
      egress: []
      egressAllowRules:
        cloudMetadataServer: false
        dnsPortsCloudMetadataServer: true
        dnsPortsKubeSystemNamespace: true
        dnsPortsPrivateIPs: true
        nonPrivateIPs: true
        privateIPs: true   # needed for cluster-internal API calls

  scheduling:
    userScheduler:
      enabled: false    # overkill for dev (2-5 projects)
      image:
        name: n47w5524.c1.de1.container-registry.ovh.net/hdc-services-external/kube-scheduler
        tag: "v1.26.15"
    userPlaceholder:
      image:
        name: n47w5524.c1.de1.container-registry.ovh.net/hdc-services-external/pause
        tag: "3.9"

  prePuller:
    hook:
      enabled: false    # skip — saves mirroring k8s-image-awaiter, not needed for dev scale
      image:
        name: n47w5524.c1.de1.container-registry.ovh.net/hdc-services-external/jupyterhub/k8s-image-awaiter
        tag: "3.3.8"
    continuous:
      enabled: false
    pause:
      image:
        name: n47w5524.c1.de1.container-registry.ovh.net/hdc-services-external/pause
        tag: "3.9"

  cull:
    enabled: true
    timeout: 3600
    every: 600
